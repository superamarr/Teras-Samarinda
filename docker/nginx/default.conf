server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 32M;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Upload statis (volume bersama dengan container PHP)
    location /uploads/ {
        alias /var/www/backend/public/uploads/;
        access_log off;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # API PHP (router di backend/public/index.php)
    location ~ ^/(auth|hero|about|analytics|activities|facilities|events|gallery|contact|bookings|activity-logs|system|users)(/|$) {
        include fastcgi_params;
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/backend/public/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/backend/public;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_read_timeout 120;
    }

    # SPA Vue Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
