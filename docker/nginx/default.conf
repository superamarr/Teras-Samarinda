server {
    listen 80;
    server_name taufikramadhani.web.id www.taufikramadhani.web.id _;

    root /usr/share/nginx/html;
    index index.html;

    # Frontend static + SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Public uploads from backend
    location /uploads/ {
        alias /var/www/backend/public/uploads/;
        access_log off;
        expires 7d;
    }

    # API prefix to backend router
    location ^~ /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        root /var/www/backend/public;
        try_files $uri /index.php?$query_string;

        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/backend/public/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param PATH_INFO "";
        fastcgi_pass php:9000;
    }

    # Optional direct PHP endpoint (e.g. reset-password.php)
    location ~ \.php$ {
        root /var/www/backend/public;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/backend/public$fastcgi_script_name;
        fastcgi_pass php:9000;
    }
}
